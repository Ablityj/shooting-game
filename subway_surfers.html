<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Subway Surfers - 地铁跑酷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;image-rendering:pixelated}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Segoe UI',sans-serif}
.menu-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;pointer-events:auto}
.title{font-size:4em;color:#FFD700;text-shadow:0 0 30px #FF6B00,0 0 60px #FF3B00,0 4px 0 #C0392B;letter-spacing:4px;animation:titlePulse 2s infinite alternate}
@keyframes titlePulse{from{transform:scale(1)}to{transform:scale(1.05)}}
.subtitle{font-size:1.5em;color:#fff;margin:20px 0;text-shadow:0 0 15px #00BFFF,0 0 30px #00BFFF;letter-spacing:6px}
.btn{background:linear-gradient(180deg,#FFD700,#FF8C00);border:none;border-radius:50px;padding:15px 60px;font-size:1.8em;color:#fff;font-weight:bold;cursor:pointer;text-shadow:0 2px 0 #C0392B;box-shadow:0 6px 0 #C0392B,0 8px 20px rgba(255,107,0,0.5);transition:all .1s;pointer-events:auto;margin:10px;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);animation:btnShine 3s infinite}
@keyframes btnShine{0%{left:-100%}50%,100%{left:100%}}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 0 #C0392B,0 10px 25px rgba(255,107,0,0.6)}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 #C0392B}
.hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;align-items:flex-start;opacity:0;transition:opacity .3s;pointer-events:none}
.hud.show{opacity:1}
.hud-left{color:#fff;font-size:1.4em;text-shadow:0 2px 4px rgba(0,0,0,0.8)}
.hud-right{color:#fff;font-size:1.2em;text-align:right;text-shadow:0 2px 4px rgba(0,0,0,0.8)}
.score-label{color:#FFD700;font-size:.8em}
#score{font-size:2em;color:#fff}
#best{color:#ccc}
.coins-display{color:#FFD700;margin-top:5px}
.distance-display{color:#00BFFF;margin-top:3px;font-size:.9em}
.pause-btn{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);border:2px solid #fff;border-radius:10px;padding:5px 15px;color:#fff;font-size:1em;cursor:pointer;pointer-events:auto;display:none;transition:all .2s}
.pause-btn.show{display:block}
.pause-btn:hover{background:rgba(255,255,255,.2)}
.gameover-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;backdrop-filter:blur(5px)}
.gameover-screen.show{display:flex;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.gameover-title{font-size:3em;color:#FF4444;text-shadow:0 0 30px #FF0000;margin-bottom:20px;animation:pulseRed 1s infinite alternate}
@keyframes pulseRed{from{text-shadow:0 0 20px #FF0000}to{text-shadow:0 0 50px #FF0000,0 0 80px #FF4400}}
.final-score{font-size:2em;color:#FFD700;margin:10px 0}
.stats-row{display:flex;gap:30px;margin:10px 0}
.stat-box{background:rgba(255,255,255,.1);border-radius:10px;padding:10px 20px;text-align:center}
.stat-val{font-size:1.5em;color:#fff}
.stat-lbl{font-size:.8em;color:#aaa}
.new-best{font-size:1.5em;color:#00FF00;text-shadow:0 0 15px #00FF00;animation:blink .5s infinite alternate;margin:10px 0}
@keyframes blink{from{opacity:1;transform:scale(1)}to{opacity:0.5;transform:scale(1.1)}}
.hint{font-size:.9em;color:#aaa;margin-top:5px}
.controls-hint{color:#ccc;font-size:.9em;margin-top:30px;text-align:center;line-height:1.8}
.combo-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3em;color:#FFD700;text-shadow:0 0 20px #FF6B00;pointer-events:none;opacity:0;transition:opacity .3s,transform .3s}
.combo-display.show{opacity:1;animation:comboPopup .5s ease}
@keyframes comboPopup{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}50%{transform:translate(-50%,-50%) scale(1.2)}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.distance-bar{position:absolute;bottom:0;left:0;height:4px;background:linear-gradient(90deg,#00BFFF,#FF6B00,#FF4444);transition:width .3s;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="menu-screen" id="menuScreen">
    <div class="title">地铁跑酷</div>
    <div class="subtitle">SUBWAY SURFERS</div>
    <button class="btn" id="startBtn">开始游戏</button>
    <div class="controls-hint">
      ← → 切换轨道 &nbsp;|&nbsp; 空格 跳跃 &nbsp;|&nbsp; ↓ 滑铲<br>
      滑动手势支持触屏设备
    </div>
  </div>
  <div class="hud" id="hud">
    <div class="hud-left">
      <div class="score-label">分数</div>
      <div id="score">0</div>
      <div class="coins-display">🪙 <span id="coins">0</span></div>
      <div class="distance-display">🏃 <span id="distance">0</span>m</div>
    </div>
    <div class="hud-right">
      <div class="score-label">最高分</div>
      <div id="best">0</div>
      <div id="comboStreak" style="color:#FF6B00;font-size:.9em;margin-top:3px;display:none">🔥 连击 x<span id="comboCount">0</span></div>
    </div>
  </div>
  <button class="pause-btn" id="pauseBtn">⏸ 暂停</button>
  <div class="gameover-screen" id="gameoverScreen">
    <div class="gameover-title">游戏结束</div>
    <div class="final-score" id="finalScore">得分: 0</div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="finalDistance">0</div><div class="stat-lbl">距离(m)</div></div>
      <div class="stat-box"><div class="stat-val" id="finalCoins">0</div><div class="stat-lbl">金币</div></div>
      <div class="stat-box"><div class="stat-val" id="finalMaxCombo">0</div><div class="stat-lbl">最大连击</div></div>
    </div>
    <div class="new-best" id="newBest" style="display:none">🏆 新纪录!</div>
    <button class="btn" id="retryBtn">再来一次</button>
    <button class="btn" id="menuBtn" style="background:linear-gradient(180deg,#888,#555);box-shadow:0 6px 0 #333,0 8px 20px rgba(0,0,0,0.3)">返回菜单</button>
  </div>
  <div class="combo-display" id="comboDisplay"></div>
  <div class="distance-bar" id="distanceBar"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game constants
const TRACK_COUNT = 3;
const TRACK_WIDTH = 120;
const LANE_WIDTH = 80;
const MAX_PARTICLES = 500;
const MAX_SPEED_LINES = 80;

// Object pools
const particlePool = [];
const speedLinePool = [];

for(let i=0;i<MAX_PARTICLES;i++) particlePool.push({active:false});
for(let i=0;i<MAX_SPEED_LINES;i++) speedLinePool.push({active:false});

// Game state
let gameState = 'menu';
let score = 0;
let coins = 0;
let bestScore = parseInt(localStorage.getItem('subwayBest') || '0');
let bestCoins = parseInt(localStorage.getItem('subwayBestCoins') || '0');
let frameCount = 0;
let speed = 5;
let baseSpeed = 5;
let speedMultiplier = 1;
let distance = 0;
let combo = 0;
let maxCombo = 0;
let comboTimer = 0;
let milestoneScore = 0;
let deathAnim = 0;
let flashEffect = 0;
let flashColor = '#fff';
let bgTheme = 0; // 0=night, 1=dawn, 2=tunnel

let player = {
  lane: 1, y: 0, jumping: false, jumpingVy: 0, jumpingTime: 0,
  sliding: false, slidingTime: 0,
  invincible: false, invincibleTime: 0,
  magnet: false, magnetTime: 0,
  jetpack: false, jetpackTime: 0, jetpackVy: 0,
  coin2x: false, coin2xTime: 0,
  laneTarget: 1, laneAnim: 0,
  trail: []
};

let obstacles = [];
let coinItems = [];
let powerups = [];
let bgOffset = 0, bgOffset2 = 0, bgOffset3 = 0;
let bgHue = 200;
let shakeAmount = 0;
let lastSpawnLane = -1;
let consecutiveSameLane = 0;
let gameTime = 0;

// Touch
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;

// Input
const keys = {};
const keyPressed = {};
window.addEventListener('keydown', e => {
  if(keyPressed[e.code]) return;
  keyPressed[e.code] = true;
  keys[e.code] = true;
  if(gameState === 'playing') {
    if(e.code === 'ArrowLeft') changeLane(-1);
    else if(e.code === 'ArrowRight') changeLane(1);
    else if(e.code === 'Space'){ e.preventDefault(); jump(); }
    else if(e.code === 'ArrowDown'){ e.preventDefault(); slide(); }
    else if(e.code === 'Escape') togglePause();
  } else if(gameState === 'paused' && e.code === 'Escape') togglePause();
});
window.addEventListener('keyup', e => {
  keyPressed[e.code] = false;
  keys[e.code] = false;
});

// Touch controls
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchStartTime = Date.now();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if(gameState !== 'playing') return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const dt = Date.now() - touchStartTime;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);
  if(dt < 300) {
    if(absDx > 30 && absDx > absDy) changeLane(dx > 0 ? 1 : -1);
    else if(dy > 40 && absDy > absDx) slide();
    else if(dy < -40) jump();
  }
}, { passive: false });

// UI elements
const menuScreen = document.getElementById('menuScreen');
const hudEl = document.getElementById('hud');
const pauseBtn = document.getElementById('pauseBtn');
const gameoverScreen = document.getElementById('gameoverScreen');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const coinsEl = document.getElementById('coins');
const distanceEl = document.getElementById('distance');
const finalScoreEl = document.getElementById('finalScore');
const finalDistanceEl = document.getElementById('finalDistance');
const finalCoinsEl = document.getElementById('finalCoins');
const finalMaxComboEl = document.getElementById('finalMaxCombo');
const newBestEl = document.getElementById('newBest');
const comboDisplayEl = document.getElementById('comboDisplay');
const comboStreakEl = document.getElementById('comboStreak');
const comboCountEl = document.getElementById('comboCount');
const distanceBarEl = document.getElementById('distanceBar');

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);
document.getElementById('menuBtn').addEventListener('click', showMenu);
document.getElementById('pauseBtn').addEventListener('click', togglePause);

bestEl.textContent = bestScore;

// Particle system with pooling
function spawnParticle(x, y, vx, vy, life, color, size) {
  for(let i=0; i<MAX_PARTICLES; i++) {
    const p = particlePool[i];
    if(!p.active) {
      p.active = true; p.x = x; p.y = y; p.vx = vx; p.vy = vy;
      p.life = life; p.maxLife = life; p.color = color; p.size = size;
      return;
    }
  }
}

function updateParticles() {
  for(let i=0; i<MAX_PARTICLES; i++) {
    const p = particlePool[i];
    if(!p.active) continue;
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.3;
    p.life--;
    p.size *= 0.96;
    if(p.life <= 0 || p.size < 0.5) p.active = false;
  }
}

function drawParticles() {
  for(let i=0; i<MAX_PARTICLES; i++) {
    const p = particlePool[i];
    if(!p.active) continue;
    ctx.globalAlpha = Math.min(1, p.life / p.maxLife * 2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = p.size * 2;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function spawnSpeedLine() {
  for(let i=0; i<MAX_SPEED_LINES; i++) {
    const sl = speedLinePool[i];
    if(!sl.active) {
      sl.active = true;
      sl.x = Math.random() * canvas.width;
      sl.y = canvas.height * 0.2 + Math.random() * canvas.height * 0.6;
      sl.vx = (Math.random() - 0.5) * 2;
      sl.vy = -speed * 2 - Math.random() * 3;
      sl.life = 25 + Math.random() * 15;
      sl.maxLife = sl.life;
      sl.len = 20 + Math.random() * 30;
      return;
    }
  }
}

function updateSpeedLines() {
  for(let i=0; i<MAX_SPEED_LINES; i++) {
    const sl = speedLinePool[i];
    if(!sl.active) continue;
    sl.x += sl.vx; sl.y += sl.vy;
    sl.life--;
    if(sl.life <= 0) sl.active = false;
  }
}

function drawSpeedLines() {
  for(let i=0; i<MAX_SPEED_LINES; i++) {
    const sl = speedLinePool[i];
    if(!sl.active) continue;
    const alpha = (sl.life / sl.maxLife) * 0.25;
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = `hsl(${200 + bgTheme * 60},80%,80%)`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(sl.x, sl.y);
    ctx.lineTo(sl.x - sl.vx * 2, sl.y - sl.vy * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function showCombo(n) {
  if(n < 3) return;
  comboDisplayEl.textContent = `🔥 x${n}`;
  comboDisplayEl.classList.remove('show');
  void comboDisplayEl.offsetWidth;
  comboDisplayEl.classList.add('show');
  setTimeout(() => comboDisplayEl.classList.remove('show'), 800);
}

function triggerFlash(color, intensity = 0.3) {
  flashEffect = intensity;
  flashColor = color;
}

function startGame() {
  gameState = 'playing';
  score = 0; coins = 0; speed = baseSpeed; speedMultiplier = 1;
  frameCount = 0; distance = 0; combo = 0; maxCombo = 0; comboTimer = 0;
  milestoneScore = 0; deathAnim = 0; flashEffect = 0; bgTheme = 0; gameTime = 0;
  bgHue = 200; shakeAmount = 0; lastSpawnLane = -1; consecutiveSameLane = 0;
  player = {
    lane: 1, laneTarget: 1, laneAnim: 0, y: 0,
    jumping: false, jumpingVy: 0, jumpingTime: 0,
    sliding: false, slidingTime: 0,
    invincible: false, invincibleTime: 0,
    magnet: false, magnetTime: 0,
    jetpack: false, jetpackTime: 0, jetpackVy: 0,
    coin2x: false, coin2xTime: 0,
    trail: []
  };
  obstacles = []; coinItems = []; powerups = [];
  // Reset pools
  for(let i=0;i<MAX_PARTICLES;i++) particlePool[i].active=false;
  for(let i=0;i<MAX_SPEED_LINES;i++) speedLinePool[i].active=false;
  menuScreen.style.display = 'none';
  gameoverScreen.classList.remove('show');
  hudEl.classList.add('show');
  pauseBtn.classList.add('show');
  comboStreakEl.style.display = 'none';
  updateHUD();
}

function showMenu() {
  gameState = 'menu';
  menuScreen.style.display = 'flex';
  hudEl.classList.remove('show');
  pauseBtn.classList.remove('show');
  gameoverScreen.classList.remove('show');
}

function togglePause() {
  if(gameState === 'playing') { gameState = 'paused'; pauseBtn.textContent = '▶ 继续'; }
  else if(gameState === 'paused') { gameState = 'playing'; pauseBtn.textContent = '⏸ 暂停'; }
}

function gameOver() {
  if(player.invincible || player.jetpack) return;
  gameState = 'gameover';
  deathAnim = 1;
  pauseBtn.classList.remove('show');
  hudEl.classList.remove('show');

  // Save best
  if(score > bestScore) {
    bestScore = score;
    localStorage.setItem('subwayBest', bestScore);
    bestEl.textContent = bestScore;
    newBestEl.style.display = 'block';
  } else { newBestEl.style.display = 'none'; }

  finalScoreEl.textContent = '得分: ' + score;
  finalDistanceEl.textContent = distance;
  finalCoinsEl.textContent = coins;
  finalMaxComboEl.textContent = maxCombo;
  setTimeout(() => gameoverScreen.classList.add('show'), 600);

  // Death explosion
  for(let i=0;i<40;i++) {
    const angle = (i/40)*Math.PI*2;
    const speed2 = 5+Math.random()*10;
    spawnParticle(
      getLaneX(player.lane), isoY(player.y) - 25,
      Math.cos(angle)*speed2, Math.sin(angle)*speed2 - 5,
      40+Math.random()*30,
      ['#FF4444','#FF8800','#FFFF00','#FFD700'][Math.floor(Math.random()*4)],
      Math.random()*8+4
    );
  }
  shakeAmount = 25;
  triggerFlash('#FF0000', 0.5);
}

function changeLane(dir) {
  const nl = player.laneTarget + dir;
  if(nl >= 0 && nl < TRACK_COUNT) player.laneTarget = nl;
}

function jump() {
  if(!player.jumping && !player.sliding && !player.jetpack) {
    player.jumping = true;
    player.jumpingVy = -18;
    player.jumpingTime = 0;
    // Jump dust
    for(let i=0;i<5;i++) {
      spawnParticle(getLaneX(player.lane), isoY(0), (Math.random()-0.5)*4, Math.random()*2, 15, '#aaa', Math.random()*4+2);
    }
  }
}

function slide() {
  if(!player.jumping && !player.sliding && !player.jetpack) {
    player.sliding = true;
    player.slidingTime = 0;
  }
}

function updateHUD() {
  scoreEl.textContent = score;
  coinsEl.textContent = coins;
  distanceEl.textContent = distance;
  // Combo display
  if(combo >= 3) {
    comboStreakEl.style.display = 'block';
    comboCountEl.textContent = combo;
  } else {
    comboStreakEl.style.display = 'none';
  }
  // Distance bar (milestone progress)
  const milestone = Math.floor(score/1000)+1;
  const progress = (score - milestoneScore) / 1000;
  distanceBarEl.style.width = Math.min(100, progress*100) + '%';
}

function getLaneX(lane) {
  const cx = canvas.width / 2;
  return cx + (lane - 1) * TRACK_WIDTH;
}

function isoY(y) {
  return canvas.height * 0.65 + y;
}

// Background themes
const THEMES = [
  { skyGrad: [[0,'hsl(220,80%,8%)'],[1,'hsl(260,60%,15%)']], groundGrad: [[0,'hsl(200,60%,15%)'],[1,'hsl(240,40%,8%)']], trackHue: 200, cityHue: 200 },
  { skyGrad: [[0,'hsl(20,90%,15%)'],[1,'hsl(40,80%,25%)']], groundGrad: [[0,'hsl(30,60%,20%)'],[1,'hsl(20,40%,10%)']], trackHue: 30, cityHue: 30 },
  { skyGrad: [[0,'hsl(0,0%,5%)'],[1,'hsl(0,0%,10%)']], groundGrad: [[0,'hsl(0,0%,8%)'],[1,'hsl(0,0%,3%)']], trackHue: 0, cityHue: 0 }
];

function drawBackground() {
  const theme = THEMES[bgTheme];
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.5);
  skyGrad.addColorStop(0, theme.skyGrad[0][1]);
  skyGrad.addColorStop(1, theme.skyGrad[1][1]);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height * 0.5);

  // Stars (only at night)
  if(bgTheme === 0) {
    for(let i=0;i<100;i++) {
      const sx = ((i*137+bgOffset*0.02)%canvas.width+canvas.width)%canvas.width;
      const sy = ((i*97)%(canvas.height*0.4));
      const sz = (Math.sin(i*0.5+frameCount*0.01)+1)*0.5;
      ctx.globalAlpha = sz*0.9;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(sx, sy, sz*1.5+0.3, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Tunnel lights (tunnel theme)
  if(bgTheme === 2) {
    for(let i=0;i<15;i++) {
      const lx = ((i*200 - bgOffset*2)%(canvas.width+400))-200;
      const ly = canvas.height*0.3 + Math.sin(i*0.5)*50;
      const pulse = (Math.sin(frameCount*0.1+i)+1)*0.5;
      ctx.globalAlpha = 0.3+pulse*0.4;
      const lg = ctx.createRadialGradient(lx, ly, 0, lx, ly, 80);
      lg.addColorStop(0, 'rgba(255,200,100,0.5)');
      lg.addColorStop(1, 'transparent');
      ctx.fillStyle = lg;
      ctx.fillRect(lx-80, ly-80, 160, 160);
    }
    ctx.globalAlpha = 1;
  }

  drawCity();
  drawGround();
  drawTracks();
}

function drawCity() {
  const bh = canvas.height * 0.38;
  const hue = THEMES[bgTheme].cityHue;
  for(let i=0;i<35;i++) {
    const bx = ((i*120 - bgOffset*0.5)%(canvas.width+200))-100;
    const bw = 40+(i%4)*20;
    const bht = 60+(i%5)*40+Math.sin(i)*30;
    const by = bh - bht;
    ctx.fillStyle = `hsl(${hue+(i*5)%60},30%,${12+(i%3)*5}%)`;
    ctx.fillRect(bx, by, bw, bht);
    // Windows with glow
    ctx.shadowColor = `hsl(${hue+40+i*3,80%,60}%)`;
    ctx.shadowBlur = 5;
    ctx.fillStyle = `hsl(${hue+40+i*3},80%,${50+(i%3)*15}%)`;
    for(let wy=by+8; wy<bh-8; wy+=14) {
      for(let wx=bx+5; wx<bx+bw-5; wx+=12) {
        if(Math.sin(wx*0.1+wy*0.1+frameCount*0.05+i)>0.1) {
          ctx.fillRect(wx, wy, 5, 7);
        }
      }
    }
    ctx.shadowBlur = 0;
  }
}

function drawGround() {
  const groundY = canvas.height * 0.4;
  const g = THEMES[bgTheme].groundGrad;
  const groundGrad = ctx.createLinearGradient(0, groundY, 0, canvas.height);
  groundGrad.addColorStop(0, g[0][1]);
  groundGrad.addColorStop(1, g[1][1]);
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
}

function drawTracks() {
  const cx = canvas.width / 2;
  const groundY = canvas.height * 0.65;
  const vanishingY = canvas.height * 0.18;
  const trackLen = canvas.height * 0.9;
  const hue = THEMES[bgTheme].trackHue;

  // Draw track planes (isometric floor with glow)
  for(let t=0; t<TRACK_COUNT; t++) {
    const laneOffset = (t-1)*TRACK_WIDTH;
    const leftX = vanishingX_func(laneOffset - TRACK_WIDTH*0.5, vanishingY, groundY, trackLen);
    const rightX = vanishingX_func(laneOffset + TRACK_WIDTH*0.5, vanishingY, groundY, trackLen);
    const farLeftX = vanishingX_func(laneOffset - TRACK_WIDTH*0.5, vanishingY, groundY, trackLen) + TRACK_WIDTH*2.2;
    const farRightX = vanishingX_func(laneOffset + TRACK_WIDTH*0.5, vanishingY, groundY, trackLen) + TRACK_WIDTH*2.2;

    const th = (hue + t*20) % 360;
    // Track surface glow
    ctx.shadowColor = `hsl(${th},60%,40%)`;
    ctx.shadowBlur = 15;
    ctx.fillStyle = `hsl(${th},50%,${10+t*2}%)`;
    ctx.beginPath();
    ctx.moveTo(vanishingX_func(laneOffset, vanishingY, groundY, trackLen), vanishingY);
    ctx.lineTo(farLeftX, groundY+trackLen);
    ctx.lineTo(farRightX, groundY+trackLen);
    ctx.lineTo(vanishingX_func(laneOffset, vanishingY, groundY, trackLen) + TRACK_WIDTH*2.2/2, vanishingY);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // Track border lines
    ctx.strokeStyle = `hsl(${th},70%,35%)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Rails
  for(let r=0;r<2;r++) {
    const railOff = (r-0.5)*LANE_WIDTH*0.6;
    ctx.strokeStyle = `hsl(40,80%,60%)`;
    ctx.lineWidth = 3;
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.moveTo(vanishingX_func(railOff, vanishingY, groundY, trackLen), vanishingY);
    ctx.lineTo(vanishingX_func(railOff, vanishingY, groundY, trackLen)+TRACK_WIDTH*2.2, groundY+trackLen);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Cross ties
  for(let d=0;d<25;d++) {
    const depth = d/25;
    const z = depth*trackLen;
    const scale = 0.3+depth*2.0;
    const ty = vanishingY + (groundY+z-vanishingY)*0.3 - depth*25;
    const tw = TRACK_WIDTH*scale*0.85;
    ctx.fillStyle = `hsl(30,40%,${18+depth*15}%)`;
    ctx.fillRect(cx - tw/2, ty, tw, 4+depth*7);
  }
}

function vanishingX_func(offset, vy, gy, z) {
  const scale = 0.3 + (z/(canvas.height*0.9))*2.0;
  return canvas.width/2 + offset*scale;
}

function drawPlayer() {
  // Smooth lane transition
  if(player.lane !== player.laneTarget) {
    player.laneAnim += 0.2;
    if(player.laneAnim >= 1) {
      player.lane = player.laneTarget;
      player.laneAnim = 0;
    }
  } else {
    player.laneAnim = 0;
  }
  const currentLane = player.lane + (player.lane !== player.laneTarget ? (player.laneTarget - player.lane) * player.laneAnim : 0);
  const px = getLaneX(player.lane) + (player.lane !== player.laneTarget ? (player.laneTarget - player.lane) * TRACK_WIDTH * player.laneAnim : 0);
  let py = isoY(player.y);

  // Player trail
  if(gameState === 'playing') {
    player.trail.push({ x: px, y: py - 25, alpha: 1 });
    if(player.trail.length > 12) player.trail.shift();
  }
  // Draw trail
  for(let i=0;i<player.trail.length;i++) {
    const t = player.trail[i];
    t.alpha -= 0.08;
    if(t.alpha > 0) {
      ctx.globalAlpha = t.alpha * 0.3;
      ctx.fillStyle = player.jetpack ? '#00FFFF' : player.invincible ? '#FFD700' : '#3498DB';
      ctx.beginPath();
      ctx.arc(t.x, t.y, 8 - i*0.5, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Jetpack particles
  if(player.jetpack) {
    for(let i=0;i<4;i++) {
      spawnParticle(
        px+(Math.random()-0.5)*20, py+15,
        (Math.random()-0.5)*4, 6+Math.random()*6,
        15+Math.random()*10,
        ['#FF6B00','#FFD700','#FF4444','#FF8C00'][Math.floor(Math.random()*4)],
        Math.random()*7+3
      );
    }
  }

  // Slide dust
  if(player.sliding && frameCount%3===0) {
    for(let i=0;i<2;i++) {
      spawnParticle(px+(Math.random()-0.5)*20, py, (Math.random()-0.5)*3, -Math.random()*2, 12, '#aaa', Math.random()*3+2);
    }
  }

  // Glow effects
  if(player.invincible && Math.floor(frameCount/3)%2===0) {
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 40;
  }
  if(player.jetpack && Math.floor(frameCount/2)%2===0) {
    ctx.shadowColor = '#00FFFF'; ctx.shadowBlur = 50;
  }
  if(player.magnet) {
    ctx.shadowColor = '#FF00FF'; ctx.shadowBlur = 20;
  }

  const isSliding = player.sliding;
  const charH = isSliding ? 18 : 50;
  const charW = 30;

  // Body with gradient
  const bodyGrad = ctx.createLinearGradient(px-charW/2, py-charH, px+charW/2, py);
  if(player.jetpack) {
    bodyGrad.addColorStop(0, '#00CED1'); bodyGrad.addColorStop(1, '#008B8B');
  } else if(player.invincible) {
    bodyGrad.addColorStop(0, '#FFD700'); bodyGrad.addColorStop(1, '#FFA500');
  } else {
    bodyGrad.addColorStop(0, '#3498DB'); bodyGrad.addColorStop(1, '#2980B9');
  }
  ctx.fillStyle = bodyGrad;
  ctx.fillRect(px-charW/2, py-charH, charW, charH);

  // Body shine
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(px-charW/2, py-charH, charW*0.3, charH);

  // Head
  if(!isSliding) {
    ctx.fillStyle = '#F4C20D';
    ctx.beginPath();
    ctx.arc(px, py-charH-9, 9, 0, Math.PI*2);
    ctx.fill();
    // Face
    ctx.fillStyle = '#fff';
    ctx.fillRect(px-4, py-charH-11, 3, 3);
    ctx.fillRect(px+1, py-charH-11, 3, 3);
    // Smile
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(px, py-charH-8, 4, 0.1*Math.PI, 0.9*Math.PI);
    ctx.stroke();
  }

  // Jetpack
  if(player.jetpack) {
    ctx.fillStyle = '#7F8C8D';
    ctx.fillRect(px-charW/2-8, py-charH-12, 7, 22);
    ctx.fillRect(px+charW/2+1, py-charH-12, 7, 22);
    // Flame with gradient
    const flameH = 18+Math.random()*12;
    const fg = ctx.createLinearGradient(px-charW/2-8, py-charH-12, px-charW/2-8, py-charH-12-flameH);
    fg.addColorStop(0, '#FF6B00'); fg.addColorStop(0.5, '#FFD700'); fg.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = fg;
    ctx.fillRect(px-charW/2-8, py-charH-12-flameH, 7, flameH);
    ctx.fillStyle = fg;
    ctx.fillRect(px+charW/2+1, py-charH-12-flameH, 7, flameH);
  }

  // Magnet aura
  if(player.magnet) {
    ctx.strokeStyle = `rgba(255,0,255,${0.3+Math.sin(frameCount*0.2)*0.2})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.arc(px, py-charH/2, 90+Math.sin(frameCount*0.15)*12, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.shadowBlur = 0;
}

// Obstacle types
const OBS_TYPES = {
  TRAIN: { w: 65, h: 50, color: '#E74C3C', pattern: 'train' },
  BARRIER: { w: 45, h: 40, color: '#E67E22', pattern: 'barrier' },
  POST: { w: 22, h: 65, color: '#9B59B6', pattern: 'post' },
  TRAIN2: { w: 70, h: 45, color: '#2ECC71', pattern: 'train2' }
};

function spawnObstacle() {
  // Smart spawning: avoid 3-lane walls and too-frequent same-lane spawns
  if(Math.random() < 0.018 * speedMultiplier) {
    let lane = Math.floor(Math.random() * TRACK_COUNT);

    // Prevent 3-lane wall
    if(frameCount > 300) {
      const threeLanes = Math.random() < 0.15;
      if(threeLanes) {
        // Spawn 2 lanes only
        const skip = Math.floor(Math.random()*3);
        for(let l=0;l<3;l++) {
          if(l === skip) continue;
          const typeKeys = Object.keys(OBS_TYPES);
          const typeKey = typeKeys[Math.floor(Math.random()*typeKeys.length)];
          obstacles.push({ lane: l, z: 1500, type: OBS_TYPES[typeKey], typeKey, passed: false });
        }
        return;
      }
    }

    // Avoid consecutive same-lane obstacles
    if(lane === lastSpawnLane && consecutiveSameLane >= 2) {
      lane = (lane + 1 + Math.floor(Math.random()*2)) % TRACK_COUNT;
    }

    if(lane === lastSpawnLane) consecutiveSameLane++;
    else consecutiveSameLane = 1;
    lastSpawnLane = lane;

    const typeKeys = Object.keys(OBS_TYPES);
    const typeKey = typeKeys[Math.floor(Math.random()*typeKeys.length)];
    obstacles.push({ lane, z: 1500, type: OBS_TYPES[typeKey], typeKey, passed: false });
  }
}

function spawnCoin() {
  if(Math.random() < 0.04 * speedMultiplier) {
    const lane = Math.floor(Math.random() * TRACK_COUNT);
    const pattern = Math.floor(Math.random() * 4);
    if(pattern === 0) {
      // Single
      coinItems.push({ lane, z: 1500, y: 0, collected: false });
    } else if(pattern === 1) {
      // Line
      for(let i=0;i<5;i++) coinItems.push({ lane, z: 1500+i*30, y: 0, collected: false });
    } else if(pattern === 2) {
      // Arc
      for(let i=0;i<4;i++) {
        const ay = Math.sin(i/3*Math.PI)*30;
        coinItems.push({ lane, z: 1500+i*25, y: ay, collected: false });
      }
    } else {
      // 3-lane line
      for(let l=0;l<3;l++) coinItems.push({ lane: l, z: 1500+Math.abs(l-1)*20, y: 0, collected: false });
    }
  }
}

function spawnPowerup() {
  if(Math.random() < 0.0025) {
    const lane = Math.floor(Math.random() * TRACK_COUNT);
    const types = ['jetpack','magnet','coin2x'];
    powerups.push({ lane, z: 1500, type: types[Math.floor(Math.random()*types.length)] });
  }
}

function drawObstacle(obs) {
  const ox = getLaneX(obs.lane);
  const depth = 1 - obs.z / 1500;
  const scale = Math.max(0.08, depth);
  const groundY = canvas.height * 0.65;
  const vanishingY = canvas.height * 0.18;
  const trackLen = canvas.height * 0.9;
  const oy = vanishingY + (groundY + obs.z - vanishingY)*0.3 - (obs.typeKey==='BARRIER' ? obs.type.h*scale*0.5 : 0);

  const ow = obs.type.w * scale;
  const oh = obs.type.h * scale;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(ox, oy+2, ow*0.6, ow*0.2, 0, 0, Math.PI*2);
  ctx.fill();

  if(obs.typeKey==='TRAIN' || obs.typeKey==='TRAIN2') {
    // Train with gradient
    const tg = ctx.createLinearGradient(ox-ow/2, oy-oh, ox+ow/2, oy);
    tg.addColorStop(0, obs.typeKey==='TRAIN2' ? '#27AE60' : '#C0392B');
    tg.addColorStop(1, obs.typeKey==='TRAIN2' ? '#1E8449' : '#922B21');
    ctx.fillStyle = tg;
    ctx.fillRect(ox-ow/2, oy-oh, ow, oh);
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(ox-ow/2, oy-oh, ow, oh*0.3);
    // Windows with glow
    ctx.shadowColor = '#85C1E9'; ctx.shadowBlur = 8*scale;
    ctx.fillStyle = '#85C1E9';
    for(let wi=0;wi<3;wi++) {
      ctx.fillRect(ox-ow/2+ow*0.12+wi*ow*0.26, oy-oh*0.85, ow*0.2, oh*0.4);
    }
    ctx.shadowBlur = 0;
    // Wheels
    ctx.fillStyle = '#2C3E50';
    ctx.beginPath();
    ctx.arc(ox-ow*0.32, oy, ow*0.1, 0, Math.PI*2);
    ctx.arc(ox+ow*0.32, oy, ow*0.1, 0, Math.PI*2);
    ctx.fill();
    // Headlight
    ctx.shadowColor = '#FFFF00'; ctx.shadowBlur = 15*scale;
    ctx.fillStyle = '#FFFF00';
    ctx.beginPath();
    ctx.arc(ox, oy-oh, ow*0.12, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  } else if(obs.typeKey==='BARRIER') {
    ctx.fillStyle = '#E67E22';
    ctx.fillRect(ox-ow/2, oy-oh, ow, oh);
    ctx.fillStyle = '#F39C12';
    ctx.fillRect(ox-ow/2, oy-oh, ow, oh*0.25);
    // Stripes
    ctx.fillStyle = '#2C3E50';
    for(let s=0;s<4;s++) {
      ctx.fillRect(ox-ow/2+s*ow/4, oy-oh*0.8, ow/10, oh*0.55);
    }
    // Warning glow
    ctx.shadowColor = '#FF6B00'; ctx.shadowBlur = 10*scale;
    ctx.strokeStyle = '#FF6B00'; ctx.lineWidth = 1;
    ctx.strokeRect(ox-ow/2, oy-oh, ow, oh);
    ctx.shadowBlur = 0;
  } else {
    // Post
    ctx.fillStyle = '#9B59B6';
    ctx.fillRect(ox-ow/2, oy-oh, ow, oh);
    // Sign
    ctx.fillStyle = '#F1C40F';
    ctx.shadowColor = '#F1C40F'; ctx.shadowBlur = 8*scale;
    ctx.beginPath();
    ctx.arc(ox, oy-oh, ow*0.45, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Inner circle
    ctx.fillStyle = '#C0392B';
    ctx.beginPath();
    ctx.arc(ox, oy-oh, ow*0.25, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawCoin(coin) {
  const cx = getLaneX(coin.lane);
  const depth = 1 - coin.z / 1500;
  const scale = Math.max(0.1, depth);
  const groundY = canvas.height * 0.65;
  const vanishingY = canvas.height * 0.18;
  const cy = vanishingY + (groundY+coin.z-vanishingY)*0.3 - 18*scale + coin.y*scale;
  const cr = 11*scale;
  const spinX = Math.abs(Math.sin(frameCount*0.12+coin.z*0.01))*cr;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(cx, cy+cr, cr*0.8, cr*0.25, 0, 0, Math.PI*2);
  ctx.fill();

  // Outer glow
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12*scale;
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(cx, cy, spinX+1, cr, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#FFA500'; ctx.lineWidth = 1.5*scale;
  ctx.stroke();
  ctx.shadowBlur = 0;
  // Inner shine
  ctx.fillStyle = '#FFF8DC';
  ctx.beginPath();
  ctx.arc(cx, cy, cr*0.4, 0, Math.PI*2);
  ctx.fill();
  // Dollar sign
  ctx.fillStyle = '#D4AF37';
  ctx.font = `bold ${8*scale}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('$', cx, cy);
}

function drawPowerup(pw) {
  const px = getLaneX(pw.lane);
  const depth = 1 - pw.z / 1500;
  const scale = Math.max(0.1, depth);
  const groundY = canvas.height * 0.65;
  const vanishingY = canvas.height * 0.18;
  const py = vanishingY + (groundY+pw.z-vanishingY)*0.3 - 22*scale;
  const pulse = Math.sin(frameCount*0.15)*6*scale;

  let color, glowColor, label;
  if(pw.type==='jetpack') { color='#00BFFF'; glowColor='#00FFFF'; label='🚀'; }
  else if(pw.type==='magnet') { color='#FF00FF'; glowColor='#FF69B4'; label='🧲'; }
  else { color='#FFD700'; glowColor='#FFA500'; label='✨'; }

  // Aura
  const auraGrad = ctx.createRadialGradient(px, py, 0, px, py, 30*scale+pulse);
  auraGrad.addColorStop(0, glowColor);
  auraGrad.addColorStop(1, 'transparent');
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = auraGrad;
  ctx.beginPath();
  ctx.arc(px, py, 30*scale+pulse, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.shadowColor = glowColor; ctx.shadowBlur = 20+pulse*2;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(px, py, 18*scale+pulse*0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = `${14*scale}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, px, py);
}

function update() {
  if(gameState !== 'playing') return;
  frameCount++;
  gameTime++;

  // Theme cycling based on distance
  const newTheme = Math.floor((distance % 3000) / 1000);
  if(newTheme !== bgTheme) { bgTheme = newTheme; triggerFlash('#fff', 0.2); }

  // Score and speed (smoother curve)
  score += Math.floor(speedMultiplier);
  distance += Math.floor(speed * 0.3);
  if(frameCount % 60 === 0) {
    speedMultiplier = 1 + Math.floor(score / 800) * 0.08;
    speed = baseSpeed + Math.floor(score / 400) * 0.4;
    speed = Math.min(speed, 20);
  }

  // Milestone
  if(score >= milestoneScore + 1000) {
    milestoneScore = Math.floor(score/1000)*1000;
    triggerFlash('#FFD700', 0.15);
    showCombo(combo);
  }

  // Background hue shift
  if(frameCount % 5 === 0) bgHue = (bgHue + 0.5) % 360;

  // Combo timer
  if(comboTimer > 0) {
    comboTimer--;
    if(comboTimer === 0) combo = 0;
  }

  // Player physics
  if(player.jumping) {
    player.jumpingVy += 0.8;
    player.y += player.jumpingVy;
    player.jumpingTime++;
    if(player.y >= 0) { player.y = 0; player.jumping = false; player.jumpingVy = 0; }
  }
  if(player.sliding) {
    player.slidingTime++;
    if(player.slidingTime > 45) player.sliding = false;
  }
  if(player.invincible) {
    player.invincibleTime--;
    if(player.invincibleTime <= 0) player.invincible = false;
  }
  if(player.magnet) {
    player.magnetTime--;
    if(player.magnetTime <= 0) player.magnet = false;
  }
  if(player.jetpack) {
    player.jetpackVy -= 0.5;
    player.y += player.jetpackVy;
    player.jetpackTime--;
    if(player.jetpackTime <= 0) {
      player.jetpack = false; player.jetpackVy = 0;
    }
    if(player.y > 0) { player.y = 0; player.jetpackVy = 0; }
    if(player.y < -350) { player.y = -350; player.jetpackVy = 0; }
  }
  if(player.coin2x) {
    player.coin2xTime--;
    if(player.coin2xTime <= 0) player.coin2x = false;
  }

  // Spawn
  spawnObstacle();
  spawnCoin();
  spawnPowerup();

  // Speed lines
  if(frameCount % 2 === 0) spawnSpeedLine();

  // Update obstacles
  const moveSpeed = speed * 3;
  for(let i=obstacles.length-1;i>=0;i--) {
    obstacles[i].z -= moveSpeed;
    if(obstacles[i].z < -100) { obstacles.splice(i, 1); continue; }

    const obs = obstacles[i];
    const laneMatch = Math.abs(obs.lane - player.lane) < 0.5 || (player.lane !== player.laneTarget && Math.abs(obs.lane - player.laneTarget) < 0.5);
    if(obs.z < 80 && obs.z > -20 && laneMatch) {
      let hit = true;
      if(player.jetpack) hit = false;
      else if(player.invincible) hit = false;
      else if(player.sliding && obs.typeKey==='BARRIER') hit = false;
      else if(player.jumping && obs.typeKey==='POST') hit = false;
      else if(player.jumping && obs.z > 20 && obs.typeKey!=='TRAIN' && obs.typeKey!=='TRAIN2') hit = false;
      if(hit) { gameOver(); return; }
    }
  }

  // Update coins
  for(let i=coinItems.length-1;i>=0;i--) {
    coinItems[i].z -= moveSpeed;
    if(coinItems[i].z < -100) { coinItems.splice(i, 1); continue; }

    const coin = coinItems[i];
    if(player.magnet && coin.z < 500 && coin.z > 0) {
      coin.y += (0 - coin.y) * 0.12;
      coin.z += (80 - coin.z) * 0.05;
    }
    const laneMatch = Math.abs(coin.lane - player.lane) < 0.5 || (player.lane !== player.laneTarget && Math.abs(coin.lane - player.laneTarget) < 0.5);
    if(coin.z < 75 && coin.z > -10 && laneMatch && !coin.collected) {
      coin.collected = true;
      combo++;
      comboTimer = 90;
      if(combo > maxCombo) maxCombo = combo;
      if(combo >= 5) showCombo(combo);
      const mult = player.coin2x ? 2 : 1;
      coins += mult;
      for(let s=0;s<6;s++) {
        spawnParticle(getLaneX(coin.lane), isoY(player.y)-20, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 20+Math.random()*15, ['#FFD700','#FFA500','#FFF8DC'][Math.floor(Math.random()*3)], Math.random()*5+2);
      }
    }
  }

  // Update powerups
  for(let i=powerups.length-1;i>=0;i--) {
    powerups[i].z -= moveSpeed;
    if(powerups[i].z < -100) { powerups.splice(i, 1); continue; }

    const pw = powerups[i];
    const laneMatch = Math.abs(pw.lane - player.lane) < 0.5 || (player.lane !== player.laneTarget && Math.abs(pw.lane - player.laneTarget) < 0.5);
    if(pw.z < 75 && pw.z > -10 && laneMatch) {
      if(pw.type==='jetpack') { player.jetpack=true; player.jetpackTime=320; player.jetpackVy=-3; player.y=-120; player.jumping=false; }
      else if(pw.type==='magnet') { player.magnet=true; player.magnetTime=600; }
      else if(pw.type==='coin2x') { player.coin2x=true; player.coin2xTime=600; }
      powerups.splice(i, 1);
      triggerFlash(pw.type==='jetpack'?'#00FFFF':pw.type==='magnet'?'#FF00FF':'#FFD700', 0.3);
      for(let s=0;s<20;s++) {
        spawnParticle(getLaneX(pw.lane||1), isoY(0)-20, (Math.random()-0.5)*14, (Math.random()-0.5)*14, 35+Math.random()*20, ['#FF6B00','#FFD700','#FF4444','#00FFFF'][Math.floor(Math.random()*4)], Math.random()*9+4);
      }
      continue;
    }
  }

  // Update particles and speed lines
  updateParticles();
  updateSpeedLines();

  // Shake decay
  if(shakeAmount > 0) shakeAmount *= 0.88;
  if(flashEffect > 0) flashEffect *= 0.85;

  // Parallax
  bgOffset += speed * 0.5;
  bgOffset2 += speed * 0.3;
  bgOffset3 += speed * 0.1;

  updateHUD();
}

function drawHUDOverlay() {
  // Active powerup indicators with progress bars
  let pwy = 75;
  const barW = 120;
  if(player.jetpack) {
    const pct = player.jetpackTime/320;
    ctx.fillStyle = 'rgba(0,191,255,0.15)'; ctx.fillRect(10, pwy, barW, 16);
    ctx.fillStyle = 'rgba(0,191,255,0.7)'; ctx.fillRect(10, pwy, barW*pct, 16);
    ctx.fillStyle = '#fff'; ctx.font = '12px Arial'; ctx.textAlign = 'left';
    ctx.fillText('🚀 ' + Math.ceil(player.jetpackTime/60)+'s', 15, pwy+12);
    pwy += 22;
  }
  if(player.magnet) {
    const pct = player.magnetTime/600;
    ctx.fillStyle = 'rgba(255,0,255,0.15)'; ctx.fillRect(10, pwy, barW, 16);
    ctx.fillStyle = 'rgba(255,0,255,0.7)'; ctx.fillRect(10, pwy, barW*pct, 16);
    ctx.fillStyle = '#fff'; ctx.font = '12px Arial'; ctx.textAlign = 'left';
    ctx.fillText('🧲 ' + Math.ceil(player.magnetTime/60)+'s', 15, pwy+12);
    pwy += 22;
  }
  if(player.coin2x) {
    const pct = player.coin2xTime/600;
    ctx.fillStyle = 'rgba(255,215,0,0.15)'; ctx.fillRect(10, pwy, barW, 16);
    ctx.fillStyle = 'rgba(255,215,0,0.7)'; ctx.fillRect(10, pwy, barW*pct, 16);
    ctx.fillStyle = '#fff'; ctx.font = '12px Arial'; ctx.textAlign = 'left';
    ctx.fillText('✨ x2 ' + Math.ceil(player.coin2xTime/60)+'s', 15, pwy+12);
    pwy += 22;
  }

  // Speed indicator
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '13px Arial'; ctx.textAlign = 'right';
  ctx.fillText('速度: ' + speed.toFixed(1) + 'x', canvas.width-15, 70);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if(shakeAmount > 0.5) {
    ctx.save();
    ctx.translate((Math.random()-0.5)*shakeAmount, (Math.random()-0.5)*shakeAmount);
  }

  drawBackground();
  drawSpeedLines();

  // Sort objects by depth
  const allObjects = [];
  for(const obs of obstacles) allObjects.push({ type:'obs', data:obs, z:obs.z });
  for(const coin of coinItems) allObjects.push({ type:'coin', data:coin, z:coin.z });
  for(const pw of powerups) allObjects.push({ type:'pw', data:pw, z:pw.z });
  allObjects.sort((a,b) => b.z - a.z);

  drawPlayer();
  for(const obj of allObjects) {
    if(obj.type==='obs') drawObstacle(obj.data);
    else if(obj.type==='coin') drawCoin(obj.data);
    else if(obj.type==='pw') drawPowerup(obj.data);
  }
  drawParticles();

  if(gameState === 'playing') drawHUDOverlay();

  if(gameState === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,.65)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = '3em Arial'; ctx.textAlign = 'center';
    ctx.fillText('⏸ 已暂停', canvas.width/2, canvas.height/2);
    ctx.font = '1.2em Arial';
    ctx.fillText('按 ESC 或点击继续', canvas.width/2, canvas.height/2+45);
  }

  if(shakeAmount > 0.5) ctx.restore();

  // Vignette
  const vignGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height*0.25, canvas.width/2, canvas.height/2, canvas.height);
  vignGrad.addColorStop(0, 'transparent');
  vignGrad.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vignGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Screen flash
  if(flashEffect > 0.01) {
    ctx.globalAlpha = flashEffect;
    ctx.fillStyle = flashColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Initialize speed lines pool
for(let i=0;i<MAX_SPEED_LINES;i++) {
  const sl = speedLinePool[i];
  sl.active = true;
  sl.x = Math.random()*canvas.width;
  sl.y = Math.random()*canvas.height;
  sl.vx = (Math.random()-0.5)*2;
  sl.vy = -speed*2-Math.random()*3;
  sl.life = Math.random()*25;
  sl.maxLife = 25;
  sl.len = 20+Math.random()*30;
}

gameLoop();
</script>
